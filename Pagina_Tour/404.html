<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/x-icon" href="Imagenes_Inicio/Icon.ico">
    <title>Página no encontrada | Page Not Found - Kev. and edw. Tours</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f1ea; /* Crema Piedra suave */
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .error-container {
            display: flex;
            flex-wrap: wrap;
            flex: 1; /* Ocupa todo el espacio disponible */
        }

        .lang-section {
            flex: 1 1 50%; /* Ocupa el 50% en PC */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }
		
        .section-es {
            background-color: #ffffff;
        }
        .section-en {
            background-color: #f4f1ea;
        }

        .error-code {
            font-size: 5em;
            font-weight: bold;
            color: #2d6a4f; /* Verde Jungla */
            margin-bottom: 10px;
            line-height: 1;
        }

        .error-title {
            font-size: 2em;
            color: #1a4030; /* Verde más oscuro */
            margin-bottom: 15px;
        }

        .error-desc {
            font-size: 1.1em;
            margin-bottom: 30px;
            color: #555;
            max-width: 400px;
        }

        .btn-home {
            background-color: #d4af37; /* Oro Maya */
            color: white;
            padding: 15px 35px;
            text-decoration: none;
            border-radius: 50px; /* Bordes redondeados elegantes */
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-home:hover {
            background-color: #b5952f;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0,0,0,0.15);
        }

        /* Responsive: apilar en celulares */
        @media (max-width: 768px) {
            .lang-section {
                flex: 1 1 100%; /* Ocupa el 100% en celular */
                padding: 50px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="lang-section section-es">
            <div class="error-code">404</div>
            <h1 class="error-title">¡Te perdiste en la selva!</h1>
            <p class="error-desc">La ruta o destino que buscas no existe, ha sido movida o está temporalmente fuera de servicio.</p>
            <a href="/index.html" class="btn-home">Regresar al Inicio</a>
        </div>

        <div class="lang-section section-en">
            <div class="error-code">404</div>
            <h1 class="error-title">Lost in the jungle!</h1>
            <p class="error-desc">The path or destination you are looking for doesn't exist, has been moved, or is temporarily unavailable.</p>
            <a href="/index_en.html" class="btn-home">Return to Home</a>
        </div>
    </div>

</body>
</html>
